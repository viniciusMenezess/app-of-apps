apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: appset-webcolor-multicluster
  namespace: argocd
spec:
  generators:
  - matrix:
    generators:
      - list:
          elements: 
            - environment: "dev" 
            - environment: "hmg"
      - clusters: 
          selector: 
            matchLabels: 
              deploy: "true"
  template:
    metadata:
      name: 'web-color-environment-{{name}}-{{environment}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/viniciusMenezess/web-page-deploy
        path: 'k8s-{{environment}}'
        targetRevision: HEAD
      destination:
        namespace: 'webcolor-{{environment}}'
        server: '{{server}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true